# Configuração do Monitor de Câmbio EUR/BRL - Salvador, BA
# ========================================================

moeda: EUR
cidade: Salvador
estado: BA

# Threshold de alerta (R$ por EUR) - null = desabilitado
# Quando definido, destaca casas abaixo deste valor
THRESHOLD_EUR_BRL: null

# IOF aplicável
iof:
  especie: 0.011    # 1,1% para moeda em espécie
  cartao: 0.0638    # 6,38% para cartão pré-pago (atualizado)

# Volumes de referência para cálculo comparativo (em EUR)
volumes_referencia:
  - 5000
  - 10000
  - 20000

# Discrepância máxima vs PTAX antes de flagar para revisão (%)
max_spread_ptax: 3.0

# Dias de histórico mantidos
historico_dias: 90

