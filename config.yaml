# Configuracao do Monitor de Cambio EUR/BRL - Salvador, BA
# ========================================================
#
# Casas que o scraper popula automaticamente sao cadastradas em runtime
# (slug com sufixo "-mc"). As entradas abaixo sao apenas para casas que
# voce queira preencher manualmente via data/manual_quotes.json
# (ex: Confidence, Get Money quando nao aparecem no MelhorCambio).

moeda: EUR
cidade: Salvador
estado: BA

# IOF (Decreto 12.499/2025)
iof:
  especie: 0.011    # 1,1% espécie
  cartao: 0.0638    # 6,38% cartão pré-pago

# Threshold para flagar discrepancias suspeitas
max_spread_ptax: 5.0   # %

# Historico mantido
historico_dias: 90

# Volumes de referencia para ranking
volumes_referencia:
  - 5000
  - 10000
  - 20000

# Casas para entrada manual via data/manual_quotes.json
# (o scraper MelhorCambio adiciona casas automaticamente com sufixo "-mc")
casas_cambio:
