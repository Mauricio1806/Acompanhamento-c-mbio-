name: Cambio Salvador - Coleta Diaria

on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coleta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper + build JSONs
        run: |
          python main.py --collect
          python main.py --build-json

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cambio.db docs/data/*.json
          git diff --staged --quiet || git commit -m "chore: coleta automatica $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
